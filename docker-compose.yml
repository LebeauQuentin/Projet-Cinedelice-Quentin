services:
  api:
    # construire l'image de l'api
    build:
      context: ./api
      dockerfile: Dockerfile.api
    # exposer le port 3000 de l'api dans le conteneur
    ports:
      - "3000:3000"
    # nom du conteneur
    container_name: api
    # dépendre du conteneur de la base de données
    depends_on:
      - database
    # Ajout du volume pour le dossier api
    volumes:
      - ./api:/usr/src/app:delegated
      - /usr/src/app/node_modules
    # définir l'environnement de développement pour le hot reload
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true


  database:
    # construire l'image
    build:
      context: ./api
      dockerfile: Dockerfile.database
    # exposer le port 5432 dans le client
    ports:
      - "5433:5432"
    # nom du conteneur
    container_name: database
    # utiliser le fichier .env.db.docker pour les variables d'environnement
    env_file:
      - ./api/.env.db.docker

    # monter le volume pour la base de données pour garder les données après le redémarrage du conteneur
    volumes:
      - ./api/data:/docker-entrypoint-initdb.d
      - db_data:/var/lib/postgresql/data
  
  client:
    # construire l'image du client
    build:
      context: ./front
      dockerfile: Dockerfile.cli
    # exposer le port 4173 du client dans le conteneur
    ports:
      - "5173:5173"
    # nom du conteneur
    container_name: client
    # dépendre de l'api
    depends_on:
      - api
    # définir l'environnement de développement
    volumes:
      - ./front:/usr/src/app:delegated
      - /usr/src/app/node_modules
    # définir l'environnement de développement pour le hot reload
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - VITE_USE_POLLING=true

# volumes pour garder les données après le redémarrage du conteneur
volumes:
  db_data:
