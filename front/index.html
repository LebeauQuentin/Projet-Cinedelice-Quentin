<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icones/cd.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ciné Délices</title>

    <!-- Meta Description (150-160 caractères, incite au clic) -->
    <meta name="description" content="Découvrez des recettes inspirées de films cultes sur Ciné Délices. Reproduisez chez vous les plats emblématiques du cinéma et vivez une expérience gourmande et cinéphile !">
    
    <!-- Meta Keywords (moins important aujourd’hui mais utile) -->
    <meta name="keywords" content="recettes de films, cuisine et cinéma, plats emblématiques, gastronomie cinéma, cuisine inspirée du cinéma, Ciné Délices">
    
    <!-- Meta Author -->
    <meta name="author" content="O'clock - Risotto - Sonia / Enric / Sebastien / Quentin">
    
    <!-- Meta Robots (indexation des moteurs de recherche) -->
    <meta name="robots" content="index, follow">
    
    <!-- Piste d'amélioration pour le SEO : Module "React Helmet" qui gère dynamiquement les metadonnées pour chacune des pages 
    Avantage : SEO optimisé, Dynamique et Facile à maintenir
    Inconvénient : Un module suplementaire -->

    <!-- Open Graph (pour un bon affichage sur les réseaux sociaux) -->
    <meta property="og:title" content="Ciné Délices - Recettes inspirées du cinéma">
    <meta property="og:description" content="Explorez des recettes issues du cinéma et cuisinez les plats de vos films préférés !">
    <meta property="og:image" content="URL_Du_SITE/images/Banniere.webp"> <!-- TODO mettre url du site -->
    <meta property="og:url" content="URL_Du_SITE"> <!-- TODO mettre url du site -->
    <meta property="og:type" content="website">
    
    <!-- Twitter Card (pour un bon affichage sur Twitter) -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Ciné Délices - Recettes inspirées du cinéma">
    <meta name="twitter:description" content="Reproduisez chez vous les plats emblématiques du cinéma avec Ciné Délices.">
    <meta name="twitter:image" content="URL_Du_SITE/images/Banniere.webp"> <!-- TODO mettre url du site -->

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
